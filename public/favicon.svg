<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Bright blue to deep blue/indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <!-- Shadow for the paper -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Sheet of Paper (Worksheet) with shadow -->
  <rect x="112" y="96" width="288" height="320" rx="24" fill="#ffffff" filter="url(#shadow)" />

  <!-- Worksheet Details (Lines & Table Grid) -->
  <!-- Top header line/title box -->
  <rect x="144" y="136" width="144" height="24" rx="8" fill="#e2e8f0" />
  <!-- Name box on the right -->
  <rect x="304" y="136" width="64" height="24" rx="8" fill="#e2e8f0" />

  <!-- Title section lines -->
  <rect x="144" y="184" width="224" height="12" rx="4" fill="#94a3b8" />
  <rect x="144" y="208" width="160" height="12" rx="4" fill="#cbd5e1" />

  <!-- Simple Table Grid (represents worksheet elements) -->
  <rect x="144" y="248" width="224" height="112" rx="12" fill="none" stroke="#3b82f6" stroke-width="8" />
  <!-- Grid columns -->
  <line x1="218" y1="248" x2="218" y2="360" stroke="#3b82f6" stroke-width="8" />
  <line x1="292" y1="248" x2="292" y2="360" stroke="#3b82f6" stroke-width="8" />
  <!-- Grid rows -->
  <line x1="144" y1="285" x2="368" y2="285" stroke="#3b82f6" stroke-width="8" />
  <line x1="144" y1="322" x2="368" y2="322" stroke="#3b82f6" stroke-width="8" />
</svg>